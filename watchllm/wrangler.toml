name = "watchllm-api"
main = "apps/workers/api/src/index.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[[d1_databases]]
binding = "DB"
database_name = "watchllm-db"
database_id = "REPLACE_WITH_ACTUAL_ID"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "TRACES"
bucket_name = "watchllm-traces"

[[kv_namespaces]]
binding = "KV"
id = "REPLACE_WITH_ACTUAL_ID"

[[queues.producers]]
binding = "SIMULATION_QUEUE"
queue = "watchllm-simulations"

[vars]
APP_URL = "http://localhost:3000"

[env.orchestrator]
name = "watchllm-orchestrator"
main = "apps/workers/orchestrator/src/index.ts"

[[env.orchestrator.d1_databases]]
binding = "DB"
database_name = "watchllm-db"
database_id = "REPLACE_WITH_ACTUAL_ID"
migrations_dir = "migrations"

[[env.orchestrator.r2_buckets]]
binding = "TRACES"
bucket_name = "watchllm-traces"

[[env.orchestrator.kv_namespaces]]
binding = "KV"
id = "REPLACE_WITH_ACTUAL_ID"

[[env.orchestrator.queues.consumers]]
queue = "watchllm-simulations"
max_batch_size = 10
max_batch_timeout = 30

[[env.orchestrator.services]]
binding = "CHAOS_WORKER"
service = "watchllm-chaos"

[env.orchestrator.vars]
CHAOS_WORKER_URL = ""

[env.chaos]
name = "watchllm-chaos"
main = "apps/workers/chaos/src/index.ts"

[[env.chaos.d1_databases]]
binding = "DB"
database_name = "watchllm-db"
database_id = "REPLACE_WITH_ACTUAL_ID"
migrations_dir = "migrations"

[[env.chaos.r2_buckets]]
binding = "TRACES"
bucket_name = "watchllm-traces"

[[env.chaos.kv_namespaces]]
binding = "KV"
id = "REPLACE_WITH_ACTUAL_ID"

[env.chaos.ai]
binding = "AI"
